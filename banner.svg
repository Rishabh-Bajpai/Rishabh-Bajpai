<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="260" viewBox="0 0 1000 260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1a"/>
      <stop offset="100%" stop-color="#11121f"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f5d4"/>
      <stop offset="50%" stop-color="#8c1eff"/>
      <stop offset="100%" stop-color="#f6019f"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1000" height="260" fill="url(#bg)"/>
  <path d="M0,210 C200,170 350,250 500,210 C650,170 800,250 1000,210 L1000,260 L0,260 Z" fill="url(#neon)" opacity="0.22">
    <animate attributeName="d" values="M0,210 C200,170 350,250 500,210 C650,170 800,250 1000,210 L1000,260 L0,260 Z;M0,210 C200,250 350,170 500,210 C650,250 800,170 1000,210 L1000,260 L0,260 Z;M0,210 C200,170 350,250 500,210 C650,170 800,250 1000,210 L1000,260 L0,260 Z" keyTimes="0;0.5;1" dur="4s" repeatCount="indefinite"/>
  </path>
  <path d="M0,225 C200,190 350,260 500,225 C650,190 800,260 1000,225" fill="none" stroke="url(#neon)" stroke-width="3" filter="url(#glow)">
    <animate attributeName="d" values="M0,225 C200,190 350,260 500,225 C650,190 800,260 1000,225;M0,225 C200,260 350,190 500,225 C650,260 800,190 1000,225;M0,225 C200,190 350,260 500,225 C650,190 800,260 1000,225" keyTimes="0;0.5;1" dur="4s" repeatCount="indefinite"/>
  </path>
  <text x="500" y="115" text-anchor="middle" font-family="Fira Code, Consolas, monospace" font-size="48" font-weight="700" fill="url(#neon)" filter="url(#glow)">Dr. Rishabh Bajpai</text>
  <text x="500" y="160" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" fill="#c9d1d9">AI for Movement Disorders · Lead Contributor @ Samosa AI</text>

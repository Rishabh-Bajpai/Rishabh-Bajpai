name: Repo Stats

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compute totals
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/repo_stats.py
      - name: Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: repo-stats
          create_branch: true
          commit_message: "chore: update repo stats"
          file_pattern: "total_*.json"

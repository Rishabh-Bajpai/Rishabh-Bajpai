name: Google Scholar Stats

on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: google-scholar-stats
        continue-on-error: true

      - name: Fetch Scholar data
        run: python scripts/scholar.py

      - name: Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: google-scholar-stats
          create_branch: true
          commit_message: "chore: update scholar stats"
          file_pattern: "gs_data*.json"

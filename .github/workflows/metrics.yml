name: Metrics

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Base stats
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.base.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Rishabh-Bajpai
          base: header, activity
          config_timezone: America/Chicago

      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Rishabh-Bajpai
          base: ""
          plugin_languages: yes
          config_timezone: America/Chicago

      - name: Commit calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Rishabh-Bajpai
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: fullyear
          config_timezone: America/Chicago

      - name: Lines of code changed
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.lines.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Rishabh-Bajpai
          base: ""
          plugin_lines: yes
          plugin_lines_sections: base, repositories, history
          plugin_lines_history_limit: 1
          config_timezone: America/Chicago

      - name: Active repositories
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.repositories.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Rishabh-Bajpai
          base: ""
          plugin_repositories: yes
          plugin_repositories_featured: Rishabh-Bajpai/Child-Robot-Interaction, Rishabh-Bajpai/Teaching-aid-for-Down-Syndrome, Rishabh-Bajpai/spotify-ad-muter, Rishabh-Bajpai/Foot2hip
          config_timezone: America/Chicago

      - name: Org stats (Samosa AI)
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.org.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: samosa-ai-com
          base: header, community, repositories, metadata
          config_timezone: America/Chicago

      - name: Commit metrics
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update github metrics"
          file_pattern: "metrics*.svg"
